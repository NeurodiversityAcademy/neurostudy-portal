name: Quality

on:
  push:
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify:quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch main for coverage base
        run: git fetch --depth=50 origin main || true

      - name: Verify quality
        run: npm run verify:quality
        env:
          COVERAGE_BASE_REF: origin/main
